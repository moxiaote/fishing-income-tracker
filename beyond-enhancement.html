<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>超越强化模拟器</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet"><link href="css/simulator-common.css"rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><style>.btn-disabled{background-color:#6c757d!important;border-color:#6c757d!important;cursor:not-allowed!important;opacity:0.65}.btn-disabled:hover{transform:none!important;box-shadow:none!important}.sim-panel.btn-primary{width:100%}</style></head><body><script src="js/equipmentSync.js"></script><script src="js/formatUtils.js"></script><script src="js/simulator-layout.js"></script><div class="page-wrap"><div class="top-stats-bar"><span>突破券<strong id="total-cost">0</strong></span><span class="stat-sep">·</span><span>绿钞<strong id="total-money">0</strong></span></div><div class="sim-row"><div class="sim-col"><div class="equipment-card sim-panel"><h3 id="rod-name">大地神盖亚鱼竿</h3><div class="level-display">+<span id="rod-level">10</span></div><div id="rod-badge-info"class="skill-display"></div><div id="rod-cost"class="cost-info sim-hide-mobile">升级:<span>952</span>绿钞<span>1</span>券</div><div class="btn-count-group"><button id="rod-count-1"class="btn btn-secondary"type="button">1</button><button id="rod-count-10"class="btn btn-primary active"type="button">10</button><button id="rod-count-100"class="btn btn-secondary"type="button">100</button></div><button id="enhance-rod"class="btn btn-primary"type="button">强化</button><div id="rod-result"class="result-message"style="display: none;"></div></div></div><div class="sim-col"><div class="equipment-card sim-panel"><h3 id="reel-name">大地神盖亚线轮</h3><div class="level-display">+<span id="reel-level">10</span></div><div id="reel-badge-info"class="skill-display"></div><div id="reel-cost"class="cost-info sim-hide-mobile">升级:<span>952</span>绿钞<span>1</span>券</div><div class="btn-count-group"><button id="reel-count-1"class="btn btn-secondary"type="button">1</button><button id="reel-count-10"class="btn btn-primary active"type="button">10</button><button id="reel-count-100"class="btn btn-secondary"type="button">100</button></div><button id="enhance-reel"class="btn btn-primary"type="button">强化</button><div id="reel-result"class="result-message"style="display: none;"></div></div></div></div><div class="equipment-card rules-card"><div class="d-flex justify-content-between align-items-center card-toggle-row"><h3 class="mb-0">概率表</h3><button class="btn btn-sm btn-outline-secondary"type="button"data-bs-toggle="collapse"data-bs-target="#probability-table"aria-expanded="false"aria-controls="probability-table">表</button></div><div class="collapse"id="probability-table"data-sim-collapse><table class="table table-bordered probability-table"><thead><tr><th>强化阶段</th><th>成功率</th><th>绿钞</th><th>突破券</th></tr></thead><tbody><tr><td>+11</td><td>80.00%</td><td>952</td><td>1</td></tr><tr><td>+12</td><td>40.00%</td><td>1050</td><td>2</td></tr><tr><td>+13</td><td>20.00%</td><td>1170</td><td>3</td></tr><tr><td>+14</td><td>10.00%</td><td>1280</td><td>4</td></tr><tr><td>+15</td><td>5.00%</td><td>1397</td><td>5</td></tr><tr><td>+16</td><td>2.50%</td><td>1588</td><td>6</td></tr><tr><td>+17</td><td>1.25%</td><td>1850</td><td>7</td></tr><tr><td>+18</td><td>0.60%</td><td>2100</td><td>8</td></tr><tr><td>+19</td><td>0.30%</td><td>2351</td><td>9</td></tr><tr><td>+20</td><td>0.01%</td><td>2700</td><td>10</td></tr></tbody></table></div></div></div><script>const BADGE_SKILLS={pirate:{name:'威慑力',getEffect:(level)=>{const duration=Math.round(12-(level-1)*(4/9));const reduction=Math.round(50-(level-1)*(20/9));return`使用力量技能时，于${duration}秒内减少放线效果${reduction}%`}},trident:{name:'锐利一击',getEffect:(level)=>{const duration=Math.round(13-(level-1)*(6/9));const damage=Math.round(125-(level-1)*(50/9));return`使用拽钓时，于${duration}秒内增加伤害${damage}%`}}};function showBadgeInfo(element,badgeType,badgeLevel){if(!badgeType||badgeLevel===0){element.style.display='none';return}const skill=BADGE_SKILLS[badgeType];if(skill){const effect=skill.getEffect(badgeLevel);element.innerHTML=`<strong>${skill.name}（${badgeLevel}级）</strong><br>${effect}`;element.style.display='block'}}function loadSharedData(){const data=equipmentSync.getData();rodLevel=data.rod.level;reelLevel=data.reel.level}function saveSharedData(){equipmentSync.updateBoth({level:rodLevel},{level:reelLevel})}function updateEquipmentDisplay(){const data=equipmentSync.getData();rodNameElement.textContent=equipmentSync.getEquipmentName(data.rod);reelNameElement.textContent=equipmentSync.getEquipmentName(data.reel);rodLevelElement.textContent=data.rod.level;reelLevelElement.textContent=data.reel.level;showBadgeInfo(rodBadgeInfoElement,data.rod.badgeType,data.rod.badgeLevel);showBadgeInfo(reelBadgeInfoElement,data.reel.badgeType,data.reel.badgeLevel)}function loadData(){const saved=localStorage.getItem('beyondEnhancementData');if(saved){const data=JSON.parse(saved);totalCost=data.totalCost||0;totalMoney=data.totalMoney||0;totalCostElement.textContent=formatUtils.formatNumber(totalCost).display;totalMoneyElement.textContent=formatUtils.formatNumber(totalMoney).display}loadSharedData();updateEquipmentDisplay();updateLevelDisplay()}function saveData(){const data={totalCost:totalCost,totalMoney:totalMoney};localStorage.setItem('beyondEnhancementData',JSON.stringify(data));saveSharedData()}const enhancementProbabilities={10:0.8,11:0.4,12:0.2,13:0.1,14:0.05,15:0.025,16:0.0125,17:0.006,18:0.003,19:0.0001};const enhancementCosts={10:{money:952,ticket:1},11:{money:1050,ticket:2},12:{money:1170,ticket:3},13:{money:1280,ticket:4},14:{money:1397,ticket:5},15:{money:1588,ticket:6},16:{money:1850,ticket:7},17:{money:2100,ticket:8},18:{money:2351,ticket:9},19:{money:2700,ticket:10}};let rodLevel=10;let reelLevel=10;let totalCost=0;let totalMoney=0;const rodLevelElement=document.getElementById('rod-level');const reelLevelElement=document.getElementById('reel-level');const rodNameElement=document.getElementById('rod-name');const reelNameElement=document.getElementById('reel-name');const rodBadgeInfoElement=document.getElementById('rod-badge-info');const reelBadgeInfoElement=document.getElementById('reel-badge-info');const rodCostElement=document.getElementById('rod-cost');const reelCostElement=document.getElementById('reel-cost');const totalCostElement=document.getElementById('total-cost');const totalMoneyElement=document.getElementById('total-money');const enhanceRodButton=document.getElementById('enhance-rod');const enhanceReelButton=document.getElementById('enhance-reel');const rodResultElement=document.getElementById('rod-result');const reelResultElement=document.getElementById('reel-result');const hideTimeoutIds={};let rodCount=10;let reelCount=10;function setButtonGroupActive(groupPrefix,count){document.querySelectorAll(`[id^="${groupPrefix}-count-"]`).forEach(btn=>{btn.classList.remove('btn-primary','active');btn.classList.add('btn-secondary')});document.getElementById(`${groupPrefix}-count-${count}`).classList.remove('btn-secondary');document.getElementById(`${groupPrefix}-count-${count}`).classList.add('btn-primary','active')}document.getElementById('rod-count-1').addEventListener('click',()=>{rodCount=1;setButtonGroupActive('rod',1)});document.getElementById('rod-count-10').addEventListener('click',()=>{rodCount=10;setButtonGroupActive('rod',10)});document.getElementById('rod-count-100').addEventListener('click',()=>{rodCount=100;setButtonGroupActive('rod',100)});document.getElementById('reel-count-1').addEventListener('click',()=>{reelCount=1;setButtonGroupActive('reel',1)});document.getElementById('reel-count-10').addEventListener('click',()=>{reelCount=10;setButtonGroupActive('reel',10)});document.getElementById('reel-count-100').addEventListener('click',()=>{reelCount=100;setButtonGroupActive('reel',100)});function getCost(level){if(level>=20)return null;return enhancementCosts[level]}function updateLevelDisplay(){rodLevelElement.textContent=rodLevel;reelLevelElement.textContent=reelLevel;const rodCost=getCost(rodLevel);const reelCost=getCost(reelLevel);if(rodLevel>=20){rodCostElement.innerHTML='已达到最高等级！'}else{rodCostElement.innerHTML=`升级到下一级需要:<span>${rodCost.money}</span>绿钞，<span>${rodCost.ticket}</span>张突破券`}if(reelLevel>=20){reelCostElement.innerHTML='已达到最高等级！'}else{reelCostElement.innerHTML=`升级到下一级需要:<span>${reelCost.money}</span>绿钞，<span>${reelCost.ticket}</span>张突破券`}}function showResult(element,success,message=null){const elementId=element.id;if(hideTimeoutIds[elementId]){clearTimeout(hideTimeoutIds[elementId]);hideTimeoutIds[elementId]=null}element.style.display='block';if(success){element.className='result-message success-message';element.textContent=message||'成功！'}else{element.className='result-message failure-message';element.textContent=message||'失败！'}hideTimeoutIds[elementId]=setTimeout(()=>{element.style.display='none';hideTimeoutIds[elementId]=null},10000)}function enhanceOnce(currentLevel){if(currentLevel>=20){return{level:currentLevel,success:false,maxLevel:true}}const cost=getCost(currentLevel);totalCost+=cost.ticket;totalMoney+=cost.money;totalCostElement.textContent=formatUtils.formatNumber(totalCost).display;totalMoneyElement.textContent=formatUtils.formatNumber(totalMoney).display;const probability=enhancementProbabilities[currentLevel];const random=Math.random();const success=random<probability;if(success){return{level:currentLevel+1,success:true,maxLevel:false}}return{level:currentLevel,success:false,maxLevel:false}}async function enhanceEquipment(currentLevel,levelElement,resultElement,count=10,button){button.disabled=true;button.classList.add('btn-disabled');if(currentLevel>=20){showResult(resultElement,true,'已达到最高等级！');button.disabled=false;button.classList.remove('btn-disabled');return currentLevel}let finalLevel=currentLevel;let successCount=0;let failureCount=0;for(let i=0;i<count;i++){const result=enhanceOnce(finalLevel);if(result.maxLevel){break}if(result.success){successCount++}else{failureCount++}finalLevel=result.level;if(levelElement.id==='rod-level'){rodLevel=finalLevel}else{reelLevel=finalLevel}updateLevelDisplay();if(finalLevel>=20){break}await new Promise(resolve=>setTimeout(resolve,50))}let message;let isSuccess=successCount>0;if(finalLevel>=20){message=`强化完成！已达到最高等级！共成功${successCount}次，失败${failureCount}次`}else if(successCount>0&&failureCount>0){message=`强化完成！当前等级：+${finalLevel}，成功${successCount}次，失败${failureCount}次`}else if(successCount>0){message=`强化完成！当前等级：+${finalLevel}，全部成功！`}else{message=`强化完成！等级保持不变，全部失败`}showResult(resultElement,isSuccess,message);button.disabled=false;button.classList.remove('btn-disabled');return finalLevel}enhanceRodButton.addEventListener('click',async()=>{rodLevel=await enhanceEquipment(rodLevel,rodLevelElement,rodResultElement,rodCount,enhanceRodButton);saveData();updateEquipmentDisplay()});enhanceReelButton.addEventListener('click',async()=>{reelLevel=await enhanceEquipment(reelLevel,reelLevelElement,reelResultElement,reelCount,enhanceReelButton);saveData();updateEquipmentDisplay()});equipmentSync.listen((data)=>{loadSharedData();updateEquipmentDisplay();updateLevelDisplay()});updateLevelDisplay();loadData();</script></body></html>
