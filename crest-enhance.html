<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刻印模拟器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/simulator-common.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/simulator-layout.js"></script>
    <style>
        body.crest-enhance h2 {
            font-size: 14px;
            margin: 4px 0 6px;
            color: #333;
        }
        .crest-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .crest-option {
            padding: 10px 6px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-size: 12px;
            background-color: #fff;
        }
        .crest-option:hover {
            border-color: #007bff;
            background-color: #e3f2fd;
        }
        .crest-option.selected {
            border-color: #28a745;
            background-color: #d4edda;
            box-shadow: 0 0 8px rgba(40,167,69,0.3);
        }
        .crest-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .crest-name {
            font-weight: bold;
            color: #333;
        }
        .stage-display {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            margin-bottom: 12px;
        }
        .stage-number {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stage-label {
            font-size: 14px;
            margin-top: 4px;
            opacity: 0.9;
        }
        .tier-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
        .tier-1 {
            background-color: rgba(255,255,255,0.2);
        }
        .tier-2 {
            background-color: rgba(255,193,7,0.3);
        }
        .probability-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #fff3cd;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .probability-value {
            font-size: 28px;
            font-weight: bold;
            color: #dc3545;
        }
        .probability-label {
            font-size: 12px;
            color: #856404;
        }
        .btn {
            transition: all 0.2s ease;
            font-size: 14px;
            padding: 10px 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,123,255,0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #545b62 100%);
            border: none;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-message {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }
        .failure-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        .max-message {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 2px solid #17a2b8;
        }
        .probability-table {
            margin-top: 12px;
            font-size: 11px;
        }
        .probability-table th,
        .probability-table td {
            text-align: center;
            padding: 4px;
        }
        .probability-table .current-stage {
            font-weight: bold;
            color: #dc3545;
        }
        .probability-table .tier-1-header,
        .probability-table .tier-2-header {
            background-color: #e9ecef;
            color: #495057;
            font-size: 12px;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .action-buttons .btn {
            flex: 1;
        }
        .reset-btn {
            font-size: 11px;
            padding: 6px 12px;
        }
        .collapsible-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .collapsible-header:hover {
            color: #007bff;
        }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .collapsible-content.open {
            max-height: 500px;
        }
        .lightning { color: #f39c12; }
        .star { color: #9b59b6; }
        .sun { color: #e74c3c; }
        .moon { color: #3498db; }
        .cloud { color: #1abc9c; }
        .flower { color: #e91e63; }
        .island { color: #34495e; }

    </style>
</head>
<body class="crest-enhance">
    <div class="page-wrap">
        <h2 class="text-center" style="cursor: pointer; text-decoration: underline; color: #007bff;" onclick="confirmGlobalReset()">刻印模拟器</h2>

        <div class="top-stats-bar">
            <span>刻印 <strong id="total-attempts">0</strong></span>
            <span class="stat-sep">·</span>
            <span style="color:#28a745;">成 <strong id="total-success">0</strong></span>
            <span class="stat-sep">·</span>
            <span style="color:#dc3545;">败 <strong id="total-failure">0</strong></span>
        </div>

        <div class="card panel-card craft-main">
            <h3>选择刻印</h3>
            <div class="crest-select">
                <div class="crest-option selected" data-crest="sun" onclick="selectCrest('sun')">
                    <div class="crest-icon sun">☀</div>
                    <div class="crest-name">日之起源</div>
                </div>
                <div class="crest-option" data-crest="moon" onclick="selectCrest('moon')">
                    <div class="crest-icon moon">☽</div>
                    <div class="crest-name">月之起源</div>
                </div>
                <div class="crest-option" data-crest="cloud" onclick="selectCrest('cloud')">
                    <div class="crest-icon cloud">☁</div>
                    <div class="crest-name">云之起源</div>
                </div>
                <div class="crest-option" data-crest="flower" onclick="selectCrest('flower')">
                    <div class="crest-icon flower">✿</div>
                    <div class="crest-name">勿忘草之起源</div>
                </div>
                <div class="crest-option" data-crest="star" onclick="selectCrest('star')">
                    <div class="crest-icon star">★</div>
                    <div class="crest-name">星之起源</div>
                </div>
                <div class="crest-option" data-crest="lightning" onclick="selectCrest('lightning')">
                    <div class="crest-icon lightning">⚡</div>
                    <div class="crest-name">闪电的起源</div>
                </div>
                <div class="crest-option" data-crest="island" onclick="selectCrest('island')">
                    <div class="crest-icon island">🏝</div>
                    <div class="crest-name">岛之起源</div>
                </div>
            </div>
        </div>

        <div class="card panel-card craft-main">
            <div class="stage-display">
                <div class="stage-number" id="stage-number">Ⅰ</div>
                <div class="stage-label" id="stage-name">闪电刻印</div>
                <div class="tier-badge tier-1" id="tier-badge">第Ⅰ阶</div>
            </div>

            <div class="probability-info">
                <div>
                    <div class="probability-label">当前成功概率</div>
                </div>
                <div class="probability-value" id="probability-value">96.00%</div>
            </div>

            <div class="action-buttons">
                <button id="enhance-btn" class="btn btn-primary" onclick="enhance()">刻印</button>
                <button class="btn btn-secondary reset-btn" onclick="resetCurrentCrest()">重置当前</button>
            </div>

            <div id="result-message" class="result-message" style="display: none;"></div>
        </div>

        <div class="card panel-card rules-card">
            <div class="d-flex justify-content-between align-items-center card-toggle-row">
                <h3 class="mb-0">概率表</h3>
                <button id="toggle-btn" class="btn btn-outline-secondary btn-sm" type="button" onclick="toggleTable()">表</button>
            </div>
            <div class="collapsible-content" id="probability-table-container" data-sim-collapse>
                <table class="table table-sm probability-table">
                    <thead>
                        <tr>
                            <th colspan="2" class="tier-1-header">第Ⅰ阶（阶段Ⅰ-Ⅹ）</th>
                            <th colspan="2" class="tier-2-header">第Ⅱ阶（阶段Ⅺ-ⅩⅤ）</th>
                        </tr>
                        <tr>
                            <th>阶段</th>
                            <th>概率</th>
                            <th>阶段</th>
                            <th>概率</th>
                        </tr>
                    </thead>
                    <tbody id="probability-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CREST_DATA = {
            sun: { name: '日之起源', icon: '☀', class: 'sun' },
            moon: { name: '月之起源', icon: '☽', class: 'moon' },
            cloud: { name: '云之起源', icon: '☁', class: 'cloud' },
            flower: { name: '勿忘草之起源', icon: '✿', class: 'flower' },
            star: { name: '星之起源', icon: '★', class: 'star' },
            lightning: { name: '闪电的起源', icon: '⚡', class: 'lightning' },
            island: { name: '岛之起源', icon: '🏝', class: 'island' }
        };

        const TIER1_PROBABILITIES = [
            96.00,
            83.33,
            79.99,
            59.52,
            53.33,
            25.00,
            20.00,
            9.91,
            6.66,
            1.95
        ];

        const TIER2_PROBABILITIES = [5, 5, 5, 5, 5];

        const MAX_STAGE = 15;

        const ROMAN_NUMERALS = {
            1: 'Ⅰ',
            2: 'Ⅱ',
            3: 'Ⅲ',
            4: 'Ⅳ',
            5: 'Ⅴ',
            6: 'Ⅵ',
            7: 'Ⅶ',
            8: 'Ⅷ',
            9: 'Ⅸ',
            10: 'Ⅹ',
            11: 'Ⅺ',
            12: 'Ⅻ',
            13: 'ⅩⅢ',
            14: 'ⅩⅣ',
            15: 'ⅩⅤ'
        };

        function toRoman(num) {
            return ROMAN_NUMERALS[num] || num;
        }

        let gameState = {
            selectedCrest: 'sun',
            crestStages: {
                sun: 1,
                moon: 1,
                cloud: 1,
                flower: 1,
                star: 1,
                lightning: 1,
                island: 1
            },
            totalAttempts: 0,
            totalSuccess: 0,
            totalFailure: 0
        };

        function selectCrest(crestId) {
            gameState.selectedCrest = crestId;
            document.querySelectorAll('.crest-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelector(`.crest-option[data-crest="${crestId}"]`).classList.add('selected');
            updateDisplay();
            saveData();
        }

        function getStageInfo(stage) {
            if (stage <= 10) {
                return {
                    tier: 1,
                    index: stage - 1,
                    probability: TIER1_PROBABILITIES[stage - 1]
                };
            } else {
                return {
                    tier: 2,
                    index: stage - 11,
                    probability: TIER2_PROBABILITIES[stage - 11]
                };
            }
        }

        function updateDisplay() {
            const crestId = gameState.selectedCrest;
            const crest = CREST_DATA[crestId];
            const stage = gameState.crestStages[crestId];
            const stageInfo = getStageInfo(stage);

            document.getElementById('stage-number').textContent = toRoman(stage);
            document.getElementById('stage-name').textContent = `${crest.name}刻印`;
            document.getElementById('tier-badge').textContent = `第${toRoman(stageInfo.tier)}阶`;
            document.getElementById('tier-badge').className = `tier-badge tier-${stageInfo.tier}`;

            if (stage >= MAX_STAGE) {
                document.getElementById('probability-value').textContent = 'MAX';
                document.getElementById('enhance-btn').disabled = true;
                document.getElementById('enhance-btn').textContent = '已满级';
            } else {
                document.getElementById('probability-value').textContent = stageInfo.probability.toFixed(2) + '%';
                document.getElementById('enhance-btn').disabled = false;
                document.getElementById('enhance-btn').textContent = '刻印';
            }

            document.getElementById('total-attempts').textContent = gameState.totalAttempts;
            document.getElementById('total-success').textContent = gameState.totalSuccess;
            document.getElementById('total-failure').textContent = gameState.totalFailure;

            document.getElementById('result-message').style.display = 'none';
            updateProbabilityTable();
        }

        function updateProbabilityTable() {
            const tbody = document.getElementById('probability-table-body');
            const currentStage = gameState.crestStages[gameState.selectedCrest];
            let html = '';

            for (let i = 0; i < 10; i++) {
                const tier1Stage = i + 1;
                const tier2Stage = i + 11;
                const tier1Info = getStageInfo(tier1Stage);
                const tier2Info = tier2Stage <= MAX_STAGE ? getStageInfo(tier2Stage) : null;

                html += `<tr>
                    <td class="${tier1Stage === currentStage ? 'current-stage' : ''}">${toRoman(tier1Stage)}</td>
                    <td class="${tier1Stage === currentStage ? 'current-stage' : ''}">${tier1Info.probability.toFixed(2)}%</td>
                    ${tier2Info ? `<td class="${tier2Stage === currentStage ? 'current-stage' : ''}">${toRoman(tier2Stage)}</td>
                    <td class="${tier2Stage === currentStage ? 'current-stage' : ''}">${tier2Info.probability.toFixed(2)}%</td>` : '<td></td><td></td>'}
                </tr>`;
            }

            tbody.innerHTML = html;
        }

        function enhance() {
            const crestId = gameState.selectedCrest;
            const currentStage = gameState.crestStages[crestId];

            if (currentStage >= MAX_STAGE) {
                showResult('max', '已经到达最高阶段！');
                return;
            }

            const stageInfo = getStageInfo(currentStage);
            const random = Math.random() * 100;
            const success = random < stageInfo.probability;

            gameState.totalAttempts++;

            if (success) {
                gameState.crestStages[crestId]++;
                gameState.totalSuccess++;
                showResult('success', `刻印成功！阶段 ${toRoman(currentStage)} → ${toRoman(currentStage + 1)}`);
            } else {
                gameState.totalFailure++;
                showResult('failure', `刻印失败，当前阶段不变`);
            }

            updateDisplay();
            saveData();
        }

        function showResult(type, message) {
            const resultDiv = document.getElementById('result-message');
            resultDiv.className = `result-message ${type}-message`;
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }

        function resetCurrentCrest() {
            if (confirm('确定要重置当前刻印吗？')) {
                gameState.crestStages[gameState.selectedCrest] = 1;
                updateDisplay();
                saveData();
            }
        }

        function confirmGlobalReset() {
            if (confirm('确定要重置所有数据吗？')) {
                gameState.crestStages = {
                    lightning: 1,
                    star: 1,
                    sun: 1,
                    moon: 1,
                    cloud: 1,
                    flower: 1,
                    island: 1
                };
                gameState.totalAttempts = 0;
                gameState.totalSuccess = 0;
                gameState.totalFailure = 0;
                updateDisplay();
                saveData();
            }
        }

        function toggleTable() {
            const container = document.getElementById('probability-table-container');
            const btn = document.getElementById('toggle-btn');
            container.classList.toggle('open');
            btn.textContent = container.classList.contains('open') ? '收起' : '展开';
        }

        function saveData() {
            localStorage.setItem('crestEnhanceData', JSON.stringify(gameState));
        }

        function loadData() {
            const saved = localStorage.getItem('crestEnhanceData');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(gameState.crestStages, data.crestStages || {});
                gameState.totalAttempts = data.totalAttempts || 0;
                gameState.totalSuccess = data.totalSuccess || 0;
                gameState.totalFailure = data.totalFailure || 0;
                gameState.selectedCrest = data.selectedCrest || 'lightning';
            }
        }

        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                updateProbabilityTable();
            }, 200);
        });

        loadData();
        selectCrest(gameState.selectedCrest);
        updateDisplay();
    </script>
</body>
</html>
