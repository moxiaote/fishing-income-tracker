<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钓鱼收入统计系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
    <!-- 登录/注册界面 -->
    <div id="login-section" class="login-container">
        <div class="card">
            <div class="card-header text-center">
                <h3>钓鱼收入统计系统</h3>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码">
                </div>
                <div class="d-flex justify-content-between">
                    <button id="login-btn" class="btn btn-primary">登录</button>
                    <button id="register-btn" class="btn btn-success">注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="app-section" class="container mt-4" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>钓鱼收入统计系统</h1>
            <div>
                <span id="current-user" class="mr-3"></span>
                <button id="logout-btn" class="btn btn-outline-danger">退出</button>
            </div>
        </div>

        <!-- 总量信息 -->
        <div class="card">
            <div class="card-header">
                <h3>总量信息</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 col-sm-6">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h5 class="card-title">钻石</h5>
                                <p class="card-text display-4" id="total-diamond">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h5 class="card-title">突破券</h5>
                                <p class="card-text display-4" id="total-breakthrough">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h5 class="card-title">原石</h5>
                                <p class="card-text display-4" id="total-rawstone">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h5 class="card-title">白金</h5>
                                <p class="card-text display-4" id="total-platinum">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 添加记录表单 -->
        <div class="card">
            <div class="card-header">
                <h3>添加记录</h3>
            </div>
            <div class="card-body">
                <form id="add-record-form" class="d-flex flex-wrap align-items-end gap-3">
                    <div class="d-flex align-items-center gap-2">
                        <label for="date">日期</label>
                        <input type="date" class="form-control" id="date">
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="type">类型</label>
                        <select class="form-control" id="type">
                            <option value="收入">收入</option>
                            <option value="支出">支出</option>
                        </select>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="diamond">钻石</label>
                        <input type="number" class="form-control" id="diamond" min="0" style="width: 80px;">
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="breakthrough">突破券</label>
                        <input type="number" class="form-control" id="breakthrough" min="0" style="width: 80px;">
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="rawstone">原石</label>
                        <input type="number" class="form-control" id="rawstone" min="0" style="width: 80px;">
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="platinum">白金</label>
                        <input type="number" class="form-control" id="platinum" min="0" style="width: 80px;">
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="remark">备注</label>
                        <input type="text" class="form-control" id="remark" style="width: 150px;">
                    </div>
                    <button type="submit" class="btn btn-primary">添加记录</button>
                </form>
            </div>
        </div>

        <!-- 文件操作按钮 -->
        <div class="card">
            <div class="card-header">
                <h3>数据管理</h3>
            </div>
            <div class="card-body">
                <div class="d-flex gap-3">
                    <button id="save-to-file" class="btn btn-success">保存到文件</button>
                    <button id="load-from-file" class="btn btn-info">从文件加载</button>
                    <input type="file" id="file-input" style="display: none;" accept=".txt">
                </div>
            </div>
        </div>

        <!-- 记录列表 -->
        <div class="card">
            <div class="card-header">
                <h3>记录明细</h3>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>类型</th>
                                <th>钻石</th>
                                <th>突破券</th>
                                <th>原石</th>
                                <th>白金</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="records-table">
                            <!-- 记录将通过JavaScript动态添加 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化日期为今天
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // 全局变量
        let currentUser = null;
        let records = [];
        const fileName = 'fishing_income.txt';
        let db = null;

        // 初始化IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('FishingIncomeDB', 1);

                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    
                    // 创建用户存储
                    if (!db.objectStoreNames.contains('users')) {
                        const userStore = db.createObjectStore('users', { keyPath: 'username' });
                    }
                    
                    // 创建记录存储
                    if (!db.objectStoreNames.contains('records')) {
                        const recordStore = db.createObjectStore('records', { autoIncrement: true });
                        recordStore.createIndex('username', 'username', { unique: false });
                    }
                };

                request.onsuccess = function(event) {
                    db = event.target.result;
                    resolve(db);
                };

                request.onerror = function(event) {
                    console.error('IndexedDB初始化失败:', event.target.error);
                    reject(event.target.error);
                };
            });
        }

        // 加载用户数据
        function loadUserData(username) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve({ records: [] });
                    return;
                }

                const transaction = db.transaction(['users'], 'readonly');
                const store = transaction.objectStore('users');
                const request = store.get(username);

                request.onsuccess = function(event) {
                    const userData = event.target.result;
                    if (userData) {
                        resolve(userData);
                    } else {
                        resolve({ username: username, password: null, records: [] });
                    }
                };

                request.onerror = function(event) {
                    console.error('加载用户数据失败:', event.target.error);
                    resolve({ records: [] });
                };
            });
        }

        // 保存用户数据
        function saveUserData(username, data) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve(false);
                    return;
                }

                const transaction = db.transaction(['users'], 'readwrite');
                const store = transaction.objectStore('users');
                const request = store.put(data);

                request.onsuccess = function() {
                    resolve(true);
                };

                request.onerror = function(event) {
                    console.error('保存用户数据失败:', event.target.error);
                    resolve(false);
                };
            });
        }

        // 加载记录
        function loadRecords() {
            return records;
        }

        // 保存记录
        async function saveRecords(newRecords) {
            records = newRecords;
            if (currentUser) {
                const userData = await loadUserData(currentUser);
                userData.records = newRecords;
                await saveUserData(currentUser, userData);
            }
            displayRecords();
            calculateTotal();
        }

        // 计算总量
        function calculateTotal() {
            const records = loadRecords();
            let total = {
                diamond: 0,
                breakthrough: 0,
                rawstone: 0,
                platinum: 0
            };

            records.forEach(record => {
                const multiplier = record.type === '收入' ? 1 : -1;
                total.diamond += record.diamond * multiplier;
                total.breakthrough += record.breakthrough * multiplier;
                total.rawstone += record.rawstone * multiplier;
                total.platinum += record.platinum * multiplier;
            });

            // 更新总量显示
            document.getElementById('total-diamond').textContent = total.diamond;
            document.getElementById('total-breakthrough').textContent = total.breakthrough;
            document.getElementById('total-rawstone').textContent = total.rawstone;
            document.getElementById('total-platinum').textContent = total.platinum;
        }

        // 显示记录
        function displayRecords() {
            const records = loadRecords();
            const tableBody = document.getElementById('records-table');
            tableBody.innerHTML = '';

            records.forEach((record, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.date}</td>
                    <td>${record.type}</td>
                    <td>${record.diamond}</td>
                    <td>${record.breakthrough}</td>
                    <td>${record.rawstone}</td>
                    <td>${record.platinum}</td>
                    <td>${record.remark}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteRecord(${index})">删除</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 删除记录
        function deleteRecord(index) {
            const currentRecords = loadRecords();
            currentRecords.splice(index, 1);
            saveRecords(currentRecords);
        }

        // 添加记录
        document.getElementById('add-record-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const record = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                diamond: parseInt(document.getElementById('diamond').value) || 0,
                breakthrough: parseInt(document.getElementById('breakthrough').value) || 0,
                rawstone: parseInt(document.getElementById('rawstone').value) || 0,
                platinum: parseInt(document.getElementById('platinum').value) || 0,
                remark: document.getElementById('remark').value
            };

            const currentRecords = loadRecords();
            currentRecords.push(record);
            saveRecords(currentRecords);

            // 重置表单
            document.getElementById('diamond').value = '0';
            document.getElementById('breakthrough').value = '0';
            document.getElementById('rawstone').value = '0';
            document.getElementById('platinum').value = '0';
            document.getElementById('remark').value = '';

            alert('记录添加成功！');
        });

        // 保存到文件
        function saveToFile() {
            const records = loadRecords();
            const content = JSON.stringify(records, null, 2);
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentUser}_${fileName}`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 手动保存到文件
        document.getElementById('save-to-file').addEventListener('click', function() {
            if (!currentUser) return;
            saveToFile();
            alert('数据已保存到 ' + `${currentUser}_${fileName}` + ' 文件');
        });

        // 从文件加载
        document.getElementById('load-from-file').addEventListener('click', function() {
            if (!currentUser) return;
            document.getElementById('file-input').click();
        });

        // 文件选择事件
        document.getElementById('file-input').addEventListener('change', function(e) {
            if (!currentUser) return;
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const content = e.target.result;
                        const loadedRecords = JSON.parse(content);
                        saveRecords(loadedRecords);
                        alert('数据已从文件加载');
                    } catch (error) {
                        alert('文件格式错误，无法加载数据');
                    }
                };
                reader.readAsText(file);
            }
        });

        // 登录功能
        document.getElementById('login-btn').addEventListener('click', async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            // 验证用户
            const userData = await loadUserData(username);
            if (!userData.password) {
                alert('用户不存在，请先注册');
                return;
            }

            if (userData.password !== password) {
                alert('密码错误');
                return;
            }

            // 登录成功
            currentUser = username;
            records = userData.records || [];
            document.getElementById('current-user').textContent = `当前用户：${username}`;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            displayRecords();
            calculateTotal();
        });

        // 注册功能
        document.getElementById('register-btn').addEventListener('click', async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            // 检查用户是否已存在
            const userData = await loadUserData(username);
            if (userData.password) {
                alert('用户已存在，请直接登录');
                return;
            }

            // 注册成功
            const newUserData = {
                username: username,
                password: password,
                records: []
            };
            await saveUserData(username, newUserData);
            alert('注册成功，请登录');
        });

        // 退出功能
        document.getElementById('logout-btn').addEventListener('click', function() {
            currentUser = null;
            records = [];
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        });

        // 页面加载完成后初始化
        window.onload = async function() {
            try {
                await initDB();
                console.log('IndexedDB初始化成功');
            } catch (error) {
                console.error('IndexedDB初始化失败:', error);
                alert('数据库初始化失败，将使用本地存储作为后备方案');
            }
        };
    </script>
</body>
</html>
