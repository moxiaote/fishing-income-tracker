<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="description"content="钓鱼发烧友抽勋章宝箱模拟器，在线模拟勋章宝箱抽取概率与奖励，支持多语言界面"><meta name="keywords"content="钓鱼发烧友,抽勋章,宝箱模拟,勋章宝箱,游戏工具"><meta name="author"content="海盗毕业"><meta name="robots"content="index, follow"><title>勋章宝箱模拟器</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet"><link href="css/simulator-common.css"rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><style>.draw-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:6px}.draw-row.form-label{font-size:11px;margin-bottom:2px}.draw-row.form-select{font-size:12px;padding:4px 8px}.badge-name{font-weight:bold;font-size:12px}.badge-type{font-size:10px;color:#6c757d}</style></head><body><script src="js/formatUtils.js"></script><script src="js/simulator-layout.js"></script><div class="page-wrap"><div class="top-stats-bar"><span>珊瑚<strong id="total-cost">0</strong></span><span class="stat-sep">·</span><span>百抽<strong id="cycle-count">0</strong>/100</span></div><div class="equipment-card craft-main"><div class="draw-row"><div class="flex-grow-1"><label class="form-label"for="draw-count">次数</label><select id="draw-count"class="form-select form-select-sm"><option value="1">1次</option><option value="10">10次</option><option value="50">50次</option><option value="100">100次</option></select></div><button id="draw-button"class="btn btn-primary"type="button"style="margin-top: 0; flex-shrink: 0;">抽取</button></div><div id="draw-message"class="result-message"style="display: none;"></div></div><div class="equipment-card"><h3 class="mb-0"style="font-size: 13px; margin-bottom: 6px;">抽取结果</h3><div id="draw-results"class="badge-result sim-scroll-panel"><p style="font-size: 12px; text-align: center; color: #6c757d; margin: 0;">点击抽取开始</p></div></div><div class="equipment-card rules-card"><div class="d-flex justify-content-between align-items-center card-toggle-row"><h3 class="mb-0">概率表</h3><button class="btn btn-sm btn-outline-secondary"type="button"data-bs-toggle="collapse"data-bs-target="#probability-table"aria-expanded="false"aria-controls="probability-table">表</button></div><div class="collapse"id="probability-table"data-sim-collapse><table class="table table-bordered probability-table"><thead><tr><th>类别</th><th>道具</th><th>概率(%)</th></tr></thead><tbody><!--最高级勋章类--><tr><td rowspan="6">最高级勋章类</td><td>凤凰勋章</td><td>0.2</td></tr><tr><td>獬豸勋章</td><td>0.2</td></tr><tr><td>青龙勋章</td><td>0.75</td></tr><tr><td>白虎勋章</td><td>0.75</td></tr><tr><td>朱雀勋章</td><td>0.75</td></tr><tr><td>玄武勋章</td><td>0.75</td></tr><!--高级勋章类--><tr><td rowspan="14">高级勋章类</td><td>沙城勋章</td><td>0.4</td></tr><tr><td>冠军勋章</td><td>1.66</td></tr><tr><td>太阳伞勋章</td><td>3.03</td></tr><tr><td>冲浪勋章</td><td>3.03</td></tr><tr><td>探险家勋章</td><td>3.03</td></tr><tr><td>富饶的勋章</td><td>3.03</td></tr><tr><td>航海者勋章</td><td>3.03</td></tr><tr><td>海盗勋章</td><td>3.03</td></tr><tr><td>北极勋章</td><td>3.03</td></tr><tr><td>南极勋章</td><td>3.03</td></tr><tr><td>诞生勋章</td><td>3.03</td></tr><tr><td>复生勋章</td><td>3.03</td></tr><tr><td>鲸鱼勋章</td><td>4.85</td></tr><tr><td>三叉戟勋章</td><td>4.85</td></tr><!--普通勋章类--><tr><td rowspan="5">普通勋章类</td><td>船锚勋章</td><td>6.85</td></tr><tr><td>莱恩勋章</td><td>6.85</td></tr><tr><td>波涛勋章</td><td>14.28</td></tr><tr><td>旋涡勋章</td><td>14.28</td></tr><tr><td>海蛇勋章</td><td>14.28</td></tr></tbody></table></div></div></div><script>const SHARED_FOUR_BEAST_STORAGE='sharedFourBeastBadges';const MAX_FOUR_BEAST_INVENTORY=40;const FOUR_BEAST_TYPES=['qinglong','baihu','zhuque','xuanwu'];const FOUR_BEAST_NAMES={qinglong:'青龙勋章',baihu:'白虎勋章',zhuque:'朱雀勋章',xuanwu:'玄武勋章'};const FOUR_BEAST_ICONS={qinglong:'青',baihu:'白',zhuque:'雀',xuanwu:'玄'};const ALL_ATTRIBUTES=[{name:'增加饰品全部属性',tier:'mythic',valueRange:[100,150]},{name:'大鱼加成',tier:'mythic',valueRange:[20,35]},{name:'拽钓伤害',tier:'ultimate',valueRange:[100,130]},{name:'破防',tier:'ultimate',valueRange:[30,55]},{name:'力量条上升',tier:'ultimate',valueRange:[4,8]},{name:'力量技能追加伤害',tier:'ultimate',valueRange:[200,270]},{name:'增加线的效率',tier:'ultimate',valueRange:[0.2,0.4]},{name:'增加线的长度',tier:'mythic',valueRange:[1000,1700]}];function getRandomValueFromFixed(values,weights){if(!weights||weights.length===0){weights=[15,18,16,14,12,10,8,5,2]}const totalWeight=weights.reduce((a,b)=>a+b,0);let random=Math.random()*totalWeight;for(let i=0;i<Math.min(values.length,weights.length);i++){random-=weights[i];if(random<=0){return values[i]}}return values[values.length-1]}function generateFixedValues(min,max,count=20){const values=[];const step=(max-min)/(count-1);for(let i=0;i<count;i++){let value=min+step*i;value=Math.round(value*100)/100;values.push(value)}return values}function createFourBeastBadge(type,stars){const id=Date.now()+Math.random();const attributes=[];const attrCount=Math.min(stars,5);const shuffledAttrs=[...ALL_ATTRIBUTES].sort(()=>Math.random()-0.5);for(let i=0;i<attrCount;i++){const baseAttr=shuffledAttrs[i];const fixedValues=generateFixedValues(baseAttr.valueRange[0],baseAttr.valueRange[1]);const value=getRandomValueFromFixed(fixedValues);attributes.push({name:baseAttr.name,tier:baseAttr.tier,value:value})}return{id,type,name:FOUR_BEAST_NAMES[type],icon:FOUR_BEAST_ICONS[type],stars,attributes}}function getSharedFourBeastBadges(){try{const saved=localStorage.getItem(SHARED_FOUR_BEAST_STORAGE);return saved?JSON.parse(saved):[]}catch(e){console.error('Error loading shared four beast badges:',e);return[]}}function saveSharedFourBeastBadges(badges){try{localStorage.setItem(SHARED_FOUR_BEAST_STORAGE,JSON.stringify(badges))}catch(e){console.error('Error saving shared four beast badges:',e)}}function getFourBeastTypeFromName(name){if(name.includes('青龙'))return'qinglong';if(name.includes('白虎'))return'baihu';if(name.includes('朱雀'))return'zhuque';if(name.includes('玄武'))return'xuanwu';return null}function countFourBeastGroups(badges){const groups={};badges.forEach(badge=>{const key=`${badge.type}_${badge.stars}`;groups[key]=true});return Object.keys(groups).length}function addFourBeastBadgeToInventory(badgeName){const type=getFourBeastTypeFromName(badgeName);if(!type)return{added:0,total:0};let badges=getSharedFourBeastBadges();const addedStars=3;const existingIndex=badges.findIndex(b=>b.type===type&&b.stars===addedStars);if(existingIndex>=0){const newBadge=createFourBeastBadge(type,addedStars);badges.push(newBadge);saveSharedFourBeastBadges(badges);return{added:1,total:countFourBeastGroups(badges)}}const currentGroups=countFourBeastGroups(badges);if(currentGroups<MAX_FOUR_BEAST_INVENTORY){const newBadge=createFourBeastBadge(type,addedStars);badges.push(newBadge);saveSharedFourBeastBadges(badges);return{added:1,total:countFourBeastGroups(badges)}}return{added:0,total:currentGroups}}function loadData(){const saved=localStorage.getItem('badgeBoxData');if(saved){const data=JSON.parse(saved);totalCost=data.totalCost||0;cycleCount=data.cycleCount||0;pendingReward=data.pendingReward||false;totalCostElement.textContent=formatUtils.formatNumber(totalCost).display;cycleCountElement.textContent=cycleCount;if(pendingReward){setTimeout(()=>{showFourBeastRewardModal()},600)}if(data.drawResults){showDrawResults(data.drawResults)}}}function saveData(drawResults=null){const data={totalCost:totalCost,cycleCount:cycleCount,pendingReward:pendingReward,drawResults:drawResults};localStorage.setItem('badgeBoxData',JSON.stringify(data))}const badgeProbabilities=[{name:"凤凰勋章",type:"最高级勋章类",probability:0.2},{name:"獬豸勋章",type:"最高级勋章类",probability:0.2},{name:"青龙勋章",type:"最高级勋章类",probability:0.75},{name:"白虎勋章",type:"最高级勋章类",probability:0.75},{name:"朱雀勋章",type:"最高级勋章类",probability:0.75},{name:"玄武勋章",type:"最高级勋章类",probability:0.75},{name:"沙城勋章",type:"高级勋章类",probability:0.4},{name:"冠军勋章",type:"高级勋章类",probability:1.66},{name:"太阳伞勋章",type:"高级勋章类",probability:3.03},{name:"冲浪勋章",type:"高级勋章类",probability:3.03},{name:"探险家勋章",type:"高级勋章类",probability:3.03},{name:"富饶的勋章",type:"高级勋章类",probability:3.03},{name:"航海者勋章",type:"高级勋章类",probability:3.03},{name:"海盗勋章",type:"高级勋章类",probability:3.03},{name:"北极勋章",type:"高级勋章类",probability:3.03},{name:"南极勋章",type:"高级勋章类",probability:3.03},{name:"诞生勋章",type:"高级勋章类",probability:3.03},{name:"复生勋章",type:"高级勋章类",probability:3.03},{name:"鲸鱼勋章",type:"高级勋章类",probability:4.85},{name:"三叉戟勋章",type:"高级勋章类",probability:4.85},{name:"船锚勋章",type:"普通勋章类",probability:6.85},{name:"莱恩勋章",type:"普通勋章类",probability:6.85},{name:"波涛勋章",type:"普通勋章类",probability:14.28},{name:"旋涡勋章",type:"普通勋章类",probability:14.28},{name:"海蛇勋章",type:"普通勋章类",probability:14.28}];let totalCost=0;let cycleCount=0;let pendingReward=false;let hideTimeoutId=null;function showResult(element,success,message=null){if(hideTimeoutId){clearTimeout(hideTimeoutId);hideTimeoutId=null}element.style.display='block';if(success){element.className='result-message success-message';element.textContent=message||'成功！'}else{element.className='result-message failure-message';element.textContent=message||'失败！'}hideTimeoutId=setTimeout(()=>{element.style.display='none';hideTimeoutId=null},10000)}const totalCostElement=document.getElementById('total-cost');const cycleCountElement=document.getElementById('cycle-count');const drawCountElement=document.getElementById('draw-count');const drawButton=document.getElementById('draw-button');const drawResultsElement=document.getElementById('draw-results');const drawMessageElement=document.getElementById('draw-message');function drawBadge(){const random=Math.random()*100;let cumulativeProbability=0;for(const badge of badgeProbabilities){cumulativeProbability+=badge.probability;if(random<=cumulativeProbability){return badge}}return badgeProbabilities[badgeProbabilities.length-1]}function drawBadges(count){const results=[];for(let i=0;i<count;i++){results.push(drawBadge())}return results}function showDrawResults(results){if(results.length===0){drawResultsElement.innerHTML='<p style="font-size: 13px; text-align: center; color: #6c757d;">点击上方按钮开始抽取</p>';return}let html='';const typeCounts={};results.forEach(badge=>{if(!typeCounts[badge.type]){typeCounts[badge.type]=0}typeCounts[badge.type]++});const trueTopTierBadges=['凤凰勋章','獬豸勋章','青龙勋章','白虎勋章','朱雀勋章','玄武勋章'];let trueTopTierCount=0;results.forEach(badge=>{if(trueTopTierBadges.includes(badge.name)){trueTopTierCount++}});html+='<div class="mb-3">';for(const[type,count]of Object.entries(typeCounts)){let style='';let displayCount=count;if(type==='最高级勋章类'){style='color: red;';displayCount=trueTopTierCount}html+=`<p style="font-size: 12px; margin: 0; ${style}">${type}：${displayCount}个</p>`}html+='</div>';if(trueTopTierCount>0){html+='<div class="mb-3" style="padding: 8px; background-color: #fff3f3; border-radius: 4px; border: 1px solid #ffcdd2;">';html+='<p style="font-size: 12px; margin: 0; color: red;">恭喜获得最高级勋章！</p>';html+='</div>'}html+='<div class="row">';results.forEach((badge,index)=>{const isTrueTopTier=trueTopTierBadges.includes(badge.name);const nameStyle=isTrueTopTier?'color: red;':'';const typeStyle=isTrueTopTier?'color: red;':'';html+=`<div class="col-6 mb-2"><div style="padding: 8px; background-color: #ffffff; border-radius: 4px; border: 1px solid #dee2e6;"><div class="badge-name"style="${nameStyle}">${badge.name}</div><div class="badge-type"style="${typeStyle}">${badge.type}</div></div></div>`});html+='</div>';drawResultsElement.innerHTML=html}function showFourBeastRewardModal(){saveData();const options=['青龙勋章','白虎勋章','朱雀勋章','玄武勋章'];const selected=window.prompt('恭喜完成100抽！\n请输入编号领取奖励：\n1=青龙勋章 2=白虎勋章\n3=朱雀勋章 4=玄武勋章\n*可取消，稍后刷新网页继续领取。','1');const index=parseInt(selected)-1;if(index>=0&&index<options.length){const badgeName=options[index];const result=addFourBeastBadgeToInventory(badgeName);if(result.added>0){pendingReward=false;cycleCount=cycleCount%100;cycleCountElement.textContent=cycleCount;saveData();showResult(drawMessageElement,true,`百抽奖励：${badgeName}已发送到制作库！`)}else{saveData();showResult(drawMessageElement,false,'库存已满，奖励发送失败！')}}else{saveData();showResult(drawMessageElement,false,'未领取百抽奖励，刷新页面后会再次弹出！')}}drawButton.addEventListener('click',()=>{const count=parseInt(drawCountElement.value);const cost=count*12;totalCost+=cost;cycleCount+=count;totalCostElement.textContent=formatUtils.formatNumber(totalCost).display;if(cycleCount>=100&&!pendingReward){pendingReward=true;saveData();setTimeout(()=>{showFourBeastRewardModal()},300)}cycleCountElement.textContent=Math.min(cycleCount,100);const results=drawBadges(count);showDrawResults(results);const fourBeastBadges=['青龙勋章','白虎勋章','朱雀勋章','玄武勋章'];const trueTopTierBadges=['凤凰勋章','獬豸勋章','青龙勋章','白虎勋章','朱雀勋章','玄武勋章'];let fourBeastAdded=0;let fourBeastSkipped=0;results.forEach(badge=>{if(fourBeastBadges.includes(badge.name)){const result=addFourBeastBadgeToInventory(badge.name);fourBeastAdded+=result.added;if(result.added===0){fourBeastSkipped+=1}}});let message='';const hasTopTier=results.some(badge=>trueTopTierBadges.includes(badge.name));if(fourBeastAdded>0){message=`抽到${fourBeastAdded}个四神兽勋章已同步到制作库！`;if(fourBeastSkipped>0){message+=`（${fourBeastSkipped}个因库存已满未添加）`}}else if(hasTopTier){message='恭喜！抽到了最高级勋章！'}else{message=`抽取完成！共抽取${count}次`}showResult(drawMessageElement,true,message);saveData(results)});loadData();</script></body></html>
